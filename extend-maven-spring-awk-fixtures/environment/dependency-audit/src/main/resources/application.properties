server.port=8080
spring.application.name=dependency-audit

spring.datasource.url=jdbc:h2:file:/app/dependency-audit/data/auditdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data/seed-dependencies.sql

spring.h2.console.enabled=false
