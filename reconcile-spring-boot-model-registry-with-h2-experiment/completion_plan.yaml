  acceptance:
  - Tests fail on a naive 'trust the registry API' solution that ignores the H2 canonical
    evidence.
  - Tests pass on a correct reconciliation that promotes the policy-safe model.
  - Verifier applies a binary 0/1 reward only.
  - Verifier runs identical logic for the oracle and the agent (no oracle/agent conditional
