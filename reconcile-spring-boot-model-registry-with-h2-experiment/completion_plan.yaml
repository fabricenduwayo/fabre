  open_questions: []
  reference: https://www.harborframework.com/docs/tasks
seed:
  task_description: 'With API responses and experiment records disagreeing, the Java
    reconciliation pipeline must decide which churn model is safe to promote. The
    provided Spring Boot registry reports candidate model metadata, while the H2 experiment
    database contains canonical validation metrics, feature-hash lineage, and calibration
    status. The implementation reads the Markdown policy bundle, queries H2 through
    JDBC, calls the local API through HTTP, and emits a deployment decision manifest
    that passes JSON Schema validation.


    Instruction sketch:

    Implement a Java command-pipeline step named `reconcile-model-release` that starts
    from documented promotion rules, queries the H2 experiment database with JDBC,
    calls the provided Spring Boot model-registry API using curl/httpie-compatible
    HTTP requests, reconciles conflicting model metadata, and writes `build/release-decision.json`.
    The verification artifact is that JSON manifest, which must conform to `schemas/release-decision.schema.json`
    and contain the expected promoted, rejected, and conflict-explanation fields.
    Do not read the H2 seed data files directly; all experiment evidence must come
    from SQL queries, and all registry evidence must come from the running API.


    Target languages: Java, SQL, Bash.


    External code provided: A Spring Boot model-registry API with endpoints for candidate
    models, deployment aliases, and registry health, plus a Maven skeleton for the
    Java reconciliation step.'
  metadata:
    os: linux
    timeouts:
      build_seconds: 600
      run_seconds: 300
    emit_process_rubric: false
