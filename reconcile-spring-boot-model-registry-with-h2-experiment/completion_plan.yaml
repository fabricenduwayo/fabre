  open_questions:
  - The seed does not specify the concrete promotion thresholds (metric floors, calibration
    gate details) nor the resulting canonical promote/reject decision. The promotion-policy.md
    fixture, the H2 seed data, and the verifier's expected decision must be authored
    consistently so exactly the intended model is promotable. Prefer recomputation/invariant
    checks over a single hardcoded expected id where feasible to limit answer leakage
    in shared verifier mode.
  reference: https://www.harborframework.com/docs/tasks
